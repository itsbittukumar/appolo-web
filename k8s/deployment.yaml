apiVersion: apps/v1
kind: Deployment
metadata:
  name: appolo-deployment
  namespace: appolo
  labels:
    app: appolo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: appolo
  template:
    metadata:
      labels:
        app: appolo
    spec:
      containers:
        - name: appolo
          image: 659420055085.dkr.ecr.ap-south-1.amazonaws.com/appolo-image
          # ↑ Jenkins will override this image tag automatically
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
