apiVersion: apps/v1
kind: Deployment
metadata:
  name: appolo-deployment
  namespace: appolo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: appolo
  template:
    metadata:
      labels:
        app: appolo
    spec:
      containers:
        - name: appolo
          image: 659420055085.dkr.ecr.ap-south-1.amazonaws.com/appolo-image:latest
          ports:
            - containerPort: 80
